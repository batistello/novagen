<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artificial Genesis</title>
<style>
  body { margin: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: flex-start; height: 100vh; gap: 12px; padding-top: 20px; font-family: Arial, sans-serif; }
  canvas { border: 1px solid #333; }
  #log-panel {
    width: 320px;
    height: 600px;
    background: #111;
    border: 1px solid #333;
    border-radius: 6px;
    color: #ddd;
    font-size: 12px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #panel-fixed {
    flex-shrink: 0;
    padding: 10px;
    border-bottom: 1px solid #333;
  }
  #log-entries-wrapper {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  #log-panel .entry { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #222; }
  #log-panel .entry .who { font-weight: bold; }
  #log-panel .entry.blue .who { color: #3498db; }
  #log-panel .entry.red .who { color: #e74c3c; }
  #log-panel .entry.green .who { color: #2ecc71; }
  #log-panel .entry .time { color: #666; font-size: 10px; float: right; }
  #log-panel .entry .thought { color: #888; font-style: italic; font-size: 11px; margin-top: 2px; }
  #log-panel .status { color: #4caf50; font-size: 11px; margin-bottom: 8px; }
  #log-panel .status.disconnected { color: #e74c3c; }
  #hunger-status { font-size: 11px; color: #aaa; margin-bottom: 6px; line-height: 1.5; }
  #inventory-status { font-size: 11px; color: #999; margin-bottom: 8px; line-height: 1.5; }
  #diary-toggle { background: #222; color: #ccc; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; font-size: 11px; cursor: pointer; margin-bottom: 6px; }
  #diary-panel { display: none; background: #0d0d0d; border: 1px solid #333; border-radius: 4px; padding: 8px; margin-top: 6px; font-size: 11px; color: #bbb; max-height: 150px; overflow-y: auto; }
  @media (max-width: 700px) {
    body {
      flex-direction: column;
      align-items: center;
      height: auto;
      min-height: 100vh;
      padding-top: 10px;
      padding-bottom: 10px;
    }
    #app canvas {
      max-width: 96vw;
      height: auto !important;
    }
    #log-panel {
      width: 96vw;
      height: 340px;
      margin-top: 10px;
    }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="log-panel">
  <div id="panel-fixed">
    <div id="log-status" class="status">conectando...</div>
    <div id="hunger-status"></div>
    <div id="inventory-status"></div>
    <button id="diary-toggle">Diario do Mundo</button>
    <div id="diary-panel"></div>
  </div>
  <div id="log-entries-wrapper">
    <div id="log-entries"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.0/pixi.min.js"></script>
<script src="main.js?v=29"></script>
</body>
</html>
